# Release workflow: npm publishing via changesets + OIDC
#
# Uses npm OIDC trusted publishing — no NPM_TOKEN secret needed.
# Requires npm 11.5.1+ for OIDC support.

name: Version & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Ensure modern npm (OIDC support)
        run: npm install -g npm@11.6.4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Detect pending changesets
        id: changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm release:version

      - name: Commit version changes
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          if git diff --quiet; then
            echo "No version changes generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Version Packages"
          git push origin HEAD:main

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'false' && github.event.head_commit.message == 'Version Packages'
        run: pnpm changeset publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true
